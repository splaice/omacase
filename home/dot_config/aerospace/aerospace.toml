# omacase AeroSpace config — Hyprland-style tiling keybinds on macOS.
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# NOTE: all top-level keys MUST come before the first [table] header (e.g.
# [gaps]) — in TOML everything after a header belongs to that table.

start-at-login = true

# Tiling defaults (Hyprland-ish: gaps + accordion fallback).
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

# Normalization on so the tree behaves predictably like i3.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Restart borders/sketchybar when AeroSpace (re)starts.
after-startup-command = [
  'exec-and-forget brew services start borders',
  'exec-and-forget brew services start sketchybar',
]
# Tell SketchyBar which workspace is focused.
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE']

# Gaps (the Hyprland look). Keep this table AFTER all top-level keys above.
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8       # raise to ~40 if SketchyBar overlaps windows
outer.bottom     = 8

[mode.main.binding]
# --- focus (Alt + hjkl) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- move (Alt + Shift + hjkl) ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- resize ---
alt-minus  = 'resize smart -50'
alt-equal  = 'resize smart +50'

# --- layout ---
alt-shift-space = 'layout floating tiling'   # toggle float
alt-e           = 'layout tiles horizontal vertical'
alt-w           = 'layout accordion horizontal vertical'
alt-f           = 'fullscreen'

# --- workspaces (Alt + number) ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# --- move window to workspace (Alt + Shift + number) ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# --- misc ---
alt-tab           = 'workspace-back-and-forth'
alt-shift-tab     = 'move-workspace-to-monitor --wrap-around next'
alt-shift-c       = 'reload-config'
alt-shift-semicolon = 'mode service'   # enter a service sub-mode

[mode.service.binding]
esc          = ['reload-config', 'mode main']
r            = ['flatten-workspace-tree', 'mode main']  # reset tree
f            = ['layout floating tiling', 'mode main']
backspace    = ['close-all-windows-but-current', 'mode main']

# Example window rule: float the system Settings & Finder info windows.
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'
